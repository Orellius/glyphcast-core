<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>glyphcast-core · video as text</title>
  <style>
    :root { --green: #3ddc84; --bg: #0a0a0c; --dim: #8a8f98; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: #e7e9ee;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    body { display: flex; flex-direction: column; }
    header { padding: 14px 18px; border-bottom: 1px solid #1c1f26; display: flex;
      align-items: baseline; gap: 14px; flex-wrap: wrap; }
    h1 { font-size: 15px; margin: 0; color: var(--green); letter-spacing: .02em; }
    header .sub { color: var(--dim); }
    header a { color: var(--green); text-decoration: none; margin-left: auto; }
    .controls { display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
      padding: 10px 18px; border-bottom: 1px solid #1c1f26; }
    label { color: var(--dim); display: inline-flex; gap: 7px; align-items: center; }
    select, input[type=range] { accent-color: var(--green); background: #14171d;
      color: #e7e9ee; border: 1px solid #262b34; border-radius: 6px; padding: 3px 6px;
      font: inherit; }
    button { background: transparent; color: var(--green); border: 1px solid var(--green);
      border-radius: 6px; padding: 4px 10px; font: inherit; cursor: pointer; }
    button:hover { background: rgba(61,220,132,.1); }
    #wrap { flex: 1; min-height: 0; position: relative; }
    #screen { display: block; width: 100%; height: 100%; }
    #stats { padding: 9px 18px; border-top: 1px solid #1c1f26; color: var(--dim);
      font-size: 13px; }
    #stats b { color: #e7e9ee; font-weight: 600; }
    .ok { color: var(--green); }
    .bad { color: #ff5c5c; }
    .hint { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
      color: var(--dim); background: rgba(10,10,12,.6); padding: 4px 12px;
      border-radius: 999px; pointer-events: none; }
  </style>
</head>
<body>
  <header>
    <h1>glyphcast-core</h1>
    <span class="sub">video as text — every cell is one Unicode glyph + two colors, GPU-rendered, lossless on the wire</span>
    <a href="https://glyphcast.tv" target="_blank" rel="noopener">glyphcast.tv ↗</a>
  </header>

  <div class="controls">
    <label>cols <input type="range" id="cols" min="80" max="480" step="8" value="240" /><span id="colsVal">240</span></label>
    <label>mode
      <select id="mode">
        <option value="octant">octant 2×4</option>
        <option value="sextant">sextant 2×3</option>
        <option value="quadrant">quadrant 2×2</option>
        <option value="halfblock">halfblock</option>
        <option value="ascii">ascii</option>
      </select>
    </label>
    <label>wire
      <select id="wire">
        <option value="color">color</option>
        <option value="mono">mono</option>
      </select>
    </label>
    <label>depth
      <select id="depth">
        <option value="888">RGB888</option>
        <option value="565">RGB565</option>
      </select>
    </label>
    <button id="copy">copy frame as text</button>
    <button id="grad" hidden>↺ gradient</button>
  </div>

  <div id="wrap">
    <canvas id="screen"></canvas>
    <div class="hint">drop a video file anywhere to feed real frames</div>
  </div>

  <div id="stats">starting…</div>

  <script type="module" src="/src/demo.ts"></script>
</body>
</html>
